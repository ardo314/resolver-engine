name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/ardo314/component-engine-backend
  EDITOR_IMAGE: ghcr.io/ardo314/component-engine-editor
  NOVA_IMAGE: ghcr.io/ardo314/component-engine-nova

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get released version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Released version: ${VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: engine/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}

      - name: Build and push editor image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: engine/editor/Dockerfile
          push: true
          tags: |
            ${{ env.EDITOR_IMAGE }}:latest
            ${{ env.EDITOR_IMAGE }}:${{ steps.version.outputs.version }}

      - name: Build and push nova image
        uses: docker/build-push-action@v6
        with:
          context: deployments/nova
          file: deployments/nova/Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.NOVA_IMAGE }}:latest
            ${{ env.NOVA_IMAGE }}:${{ steps.version.outputs.version }}
