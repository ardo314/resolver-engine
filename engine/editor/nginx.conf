server {
    listen 8080;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect bare root to the configured base path.
    location = / {
        __ROOT_LOCATION_DIRECTIVE__
    }

    # Canonicalize base path without trailing slash to the slash form.
    location = __BASE_PATH_NO_SLASH__ {
        return 301 __BASE_PATH__;
    }

    # env.js and index.html must never be cached so deployments
    # pick up new configuration and code immediately.
    location = __BASE_PATH__env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        rewrite ^__BASE_PATH__env.js$ /env.js break;
        try_files $uri =404;
    }

    location = __BASE_PATH__index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        rewrite ^__BASE_PATH__index.html$ /index.html break;
        try_files $uri =404;
    }

    # Hashed Vite assets can be cached aggressively.
    location __BASE_PATH__assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        rewrite ^__BASE_PATH__(.*)$ /$1 break;
        try_files $uri =404;
    }

    # SPA fallback — serve index.html for any unknown route under the base path.
    location __BASE_PATH__ {
        rewrite ^__BASE_PATH__(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }
}
