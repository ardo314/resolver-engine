server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # env.js and index.html must never be cached so deployments
    # pick up new configuration and code immediately.
    location = __BASE_PATH__env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = __BASE_PATH__index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hashed Vite assets can be cached aggressively.
    location __BASE_PATH__assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — serve index.html for any unknown route under the base path.
    location __BASE_PATH__ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }
}
